<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0704">
<link rel="manifest" href="manifest.json">
<title>Premium Tesbih</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0704;color:#F0E0C0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.lock{text-align:center;padding:32px;max-width:380px;width:100%}
.lock-icon{width:80px;height:80px;margin:0 auto 20px;border-radius:50%;border:3px solid #C8922A;display:flex;align-items:center;justify-content:center;font-size:36px;background:rgba(200,146,42,0.08)}
.lock h1{font-size:22px;color:#E8B84B;margin-bottom:4px;font-weight:600}
.lock .sub{font-size:10px;color:#887755;letter-spacing:2px;margin-bottom:32px;text-transform:uppercase}
.lock input{width:100%;padding:14px 16px;background:#1A1209;border:1.5px solid rgba(200,146,42,0.2);border-radius:12px;color:#F0E0C0;font-size:16px;text-align:center;margin-bottom:12px;outline:none;letter-spacing:4px;transition:border-color 0.3s}
.lock input:focus{border-color:#C8922A;box-shadow:0 0 0 3px rgba(200,146,42,0.15)}
.lock input::placeholder{letter-spacing:0;color:#887755;font-size:14px}
.lock button{width:100%;padding:13px;background:linear-gradient(135deg,#C8922A,#E8B84B);color:#0A0704;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:transform 0.15s,opacity 0.15s}
.lock button:active{transform:scale(0.97);opacity:0.9}
.lock .err{color:#C84030;font-size:13px;min-height:20px;margin-bottom:4px;font-weight:500}
.lock .info{color:#887755;font-size:11px;margin-top:28px;line-height:1.7}
.lock .info strong{color:#BBA880}
.spinner{display:none;margin:16px auto;width:28px;height:28px;border:3px solid rgba(200,146,42,0.15);border-top:3px solid #E8B84B;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:0.5px;margin-top:8px;background:rgba(200,146,42,0.1);color:#C8922A;border:1px solid rgba(200,146,42,0.2)}
</style>
</head>
<body>
<div class="lock" id="lockBox">
<div class="lock-icon">&#x1F510;</div>
<h1>Premium Tesbih</h1>
<div class="sub">Her Tesbihte Ayri Bir Emek</div>
<input type="password" id="pwInput" placeholder="Passwort eingeben..." autofocus>
<div class="err" id="errMsg"></div>
<div class="spinner" id="spinner"></div>
<button id="unlockBtn" onclick="decrypt()">Entsperren</button>
<div class="badge">AES-256-GCM</div>
<div class="info"><strong>Code-Verschl&uuml;sselung aktiv.</strong><br>Ohne Passwort ist nichts lesbar.</div>
</div>

async function deriveKey(p){const e=new TextEncoder();const km=await crypto.subtle.importKey('raw',e.encode(p),{name:'PBKDF2'},false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:e.encode('PremiumTesbih_CodeEncrypt_2026'),iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt'])}
async function decrypt(){const pw=document.getElementById('pwInput').value;if(!pw){document.getElementById('errMsg').textContent='Bitte Passwort eingeben';return}document.getElementById('spinner').style.display='block';document.getElementById('unlockBtn').style.display='none';document.getElementById('errMsg').textContent='';await new Promise(r=>setTimeout(r,50));try{const key=await deriveKey(pw);const raw=Uint8Array.from(atob(EP),c=>c.charCodeAt(0));const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(0,12)},key,raw.slice(12));document.open();document.write(new TextDecoder().decode(dec));document.close()}catch(e){document.getElementById('spinner').style.display='none';document.getElementById('unlockBtn').style.display='block';document.getElementById('errMsg').textContent='Falsches Passwort!';document.getElementById('pwInput').value='';document.getElementById('pwInput').focus()}}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')decrypt()});
