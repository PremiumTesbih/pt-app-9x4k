<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0704">
<title>Premium Tesbih</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0704;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;padding:24px}
.lock{background:#1A1209;border:1px solid rgba(200,146,42,0.2);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;text-align:center}
.lock-icon{font-size:48px;margin-bottom:12px}
h1{font-size:20px;color:#E8B84B;margin-bottom:6px;font-family:serif}
p{font-size:12px;color:#887755;margin-bottom:28px;line-height:1.5}
.input-wrap{position:relative;margin-bottom:16px}
input[type=password]{
  width:100%;padding:14px 48px 14px 16px;
  background:#231A0F;border:1px solid rgba(200,146,42,0.25);
  border-radius:10px;color:#F0E0C0;font-size:18px;
  letter-spacing:6px;text-align:center;outline:none;
  transition:.2s;
}
input[type=password]:focus{border-color:#E8B84B;box-shadow:0 0 0 3px rgba(232,184,75,0.1)}
input[type=password]::placeholder{letter-spacing:1px;font-size:13px;color:#4A3520}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#887755;cursor:pointer;font-size:18px;padding:4px}
.btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#C8922A,#E8B84B);
  color:#0A0704;border:none;border-radius:10px;
  font-weight:700;font-size:15px;cursor:pointer;
  transition:.2s;margin-bottom:12px;
}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{color:#C84030;font-size:13px;min-height:20px;margin-top:4px}
.info{font-size:11px;color:#4A3520;margin-top:20px;line-height:1.6}
.progress{
  width:0%;height:3px;background:linear-gradient(90deg,#C8922A,#E8B84B);
  border-radius:3px;margin-bottom:16px;transition:width .1s;
}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .4s ease}
</style>
</head>
<body>
<div class="lock" id="lockBox">
  <div class="lock-icon">🔐</div>
  <h1>Premium Tesbih</h1>
  <p>Geschützte App · Passwort eingeben</p>
  <div class="progress" id="progress"></div>
  <div class="input-wrap">
    <input type="password" id="pwInput" placeholder="Passwort eingeben"
           autocomplete="current-password" autocorrect="off" autocapitalize="off"
           onkeydown="if(event.key==='Enter')unlock()">
    <button class="eye" onclick="toggleEye()" id="eyeBtn" tabindex="-1">👁</button>
  </div>
  <div class="err" id="err"></div>
  <button class="btn" id="unlockBtn" onclick="unlock()">🔓 Öffnen</button>
  <div class="info">
    🛡️ AES-256-GCM · PBKDF2 600.000 Iterationen<br>
    Falsche Passwörter werden verlangsamt
  </div>
</div>

const SALT="PremiumTesbih_CodeEncrypt_2026";
const ITER=600000;
let attempts=0,locked=false,showPw=false;

function toggleEye(){
  showPw=!showPw;
  const inp=document.getElementById('pwInput');
  inp.type=showPw?'text':'password';
  document.getElementById('eyeBtn').textContent=showPw?'🙈':'👁';
}

function setProgress(p){document.getElementById('progress').style.width=p+'%'}

async function unlock(){
  if(locked)return;
  const pw=document.getElementById('pwInput').value;
  if(!pw){document.getElementById('err').textContent='Bitte Passwort eingeben';return}

  const btn=document.getElementById('unlockBtn');
  btn.disabled=true;btn.textContent='⏳ Entschlüsselt...';
  document.getElementById('err').textContent='';
  setProgress(10);

  // Brute-Force Verzögerung: bei jedem Fehlversuch exponentiell länger
  if(attempts>0){
    const delay=Math.min(attempts*2000, 30000);
    btn.textContent=`⏳ Warte ${Math.ceil(delay/1000)}s...`;
    await new Promise(r=>setTimeout(r,delay));
  }

  try{
    const enc=new TextEncoder();
    setProgress(30);
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),{name:'PBKDF2'},false,['deriveKey']);
    setProgress(50);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:enc.encode(SALT),iterations:ITER,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']);
    setProgress(80);
    const raw=Uint8Array.from(atob(EP),c=>c.charCodeAt(0));
    const iv=raw.slice(0,12),ct=raw.slice(12);
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    setProgress(100);
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    attempts++;
    setProgress(0);
    btn.disabled=false;
    btn.textContent='🔓 Öffnen';
    const errEl=document.getElementById('err');
    errEl.textContent=attempts>=3
      ? `❌ Falsches Passwort (${attempts} Versuche)`
      : '❌ Falsches Passwort';
    document.getElementById('lockBox').classList.add('shake');
    setTimeout(()=>document.getElementById('lockBox').classList.remove('shake'),400);
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}

// Enter-Taste & Auto-Focus
document.getElementById('pwInput').focus();
