<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0704">
<title>Premium Tesbih</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0704;color:#F0E0C0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.lock{text-align:center;padding:32px;max-width:360px;width:100%}
.lock h1{font-size:22px;color:#E8B84B;margin-bottom:6px}
.lock .sub{font-size:10px;color:#887755;letter-spacing:1.5px;margin-bottom:32px}
.lock input{width:100%;padding:14px;background:#1A1209;border:1px solid rgba(200,146,42,0.2);border-radius:10px;color:#F0E0C0;font-size:16px;text-align:center;margin-bottom:16px;outline:none}
.lock input:focus{border-color:#C8922A;box-shadow:0 0 0 3px rgba(200,146,42,0.15)}
.lock button{width:100%;padding:12px;background:linear-gradient(135deg,#C8922A,#E8B84B);color:#0A0704;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.lock button:active{transform:scale(0.97)}
.lock .err{color:#C84030;font-size:13px;min-height:20px;margin-bottom:8px}
.lock .info{color:#887755;font-size:11px;margin-top:24px;line-height:1.6}
.lock .icon{font-size:48px;margin-bottom:16px}
.spinner{display:none;margin:16px auto;width:32px;height:32px;border:3px solid rgba(200,146,42,0.2);border-top:3px solid #E8B84B;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="lock" id="lockBox">
<div class="icon">&#x1F510;</div>
<h1>Premium Tesbih</h1>
<div class="sub">VERSCHL&Uuml;SSELT &middot; AES-256</div>
<input type="password" id="pwInput" placeholder="Passwort eingeben..." autofocus>
<div class="err" id="errMsg"></div>
<div class="spinner" id="spinner"></div>
<button id="unlockBtn" onclick="decrypt()">Entsperren</button>
<div class="info">
Der gesamte Quellcode ist mit AES-256-GCM verschl&uuml;sselt.<br>
Ohne das korrekte Passwort ist weder der Code<br>noch die Daten lesbar &mdash; auch nicht auf GitHub.

async function deriveKey(password) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
        'raw', enc.encode(password), {name: 'PBKDF2'}, false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
        {name: 'PBKDF2', salt: enc.encode('PremiumTesbih_CodeEncrypt_2026'), iterations: 200000, hash: 'SHA-256'},
        keyMaterial, {name: 'AES-GCM', length: 256}, false, ['decrypt']
    );
}

async function decrypt() {
    const pw = document.getElementById('pwInput').value;
    if (!pw) { document.getElementById('errMsg').textContent = 'Bitte Passwort eingeben'; return; }
    
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('unlockBtn').style.display = 'none';
    document.getElementById('errMsg').textContent = '';
    
    // Small delay so spinner renders
    await new Promise(r => setTimeout(r, 50));
    
    try {
        const key = await deriveKey(pw);
        
        // Decode base64
        const raw = Uint8Array.from(atob(ENCRYPTED_PAYLOAD), c => c.charCodeAt(0));
        const iv = raw.slice(0, 12);
        const data = raw.slice(12);
        
        const decrypted = await crypto.subtle.decrypt(
            {name: 'AES-GCM', iv: iv}, key, data
        );
        
        const html = new TextDecoder().decode(decrypted);
        
        // Replace entire document with decrypted app
        document.open();
        document.write(html);
        document.close();
        
    } catch(e) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('unlockBtn').style.display = 'block';
        document.getElementById('errMsg').textContent = 'Falsches Passwort!';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
    }
}

document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') decrypt();
});
</script>
