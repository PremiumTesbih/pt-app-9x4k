<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080603">
<title>Premium Tesbih</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#080603;
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  font-family:'Outfit',sans-serif;padding:24px;
  background-image:radial-gradient(ellipse at 50% 30%,rgba(212,160,53,0.06) 0%,transparent 60%);
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(circle at 50% 0%,rgba(212,160,53,0.03),transparent 50%),
             radial-gradient(circle at 20% 80%,rgba(212,160,53,0.02),transparent 40%);
}
.lock{
  background:linear-gradient(165deg,rgba(22,17,9,0.95) 0%,rgba(14,11,6,0.98) 100%);
  border:1px solid rgba(212,160,53,0.1);
  border-radius:24px;padding:44px 32px;width:100%;max-width:400px;text-align:center;
  box-shadow:0 16px 64px rgba(0,0,0,0.5),0 0 0 1px rgba(212,160,53,0.05),0 0 80px rgba(212,160,53,0.04);
  position:relative;overflow:hidden;
  animation:lockFadeIn 0.6s cubic-bezier(0.4,0,0.2,1);
}
.lock::before{
  content:'';position:absolute;top:-1px;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(240,196,92,0.3),transparent);
}
@keyframes lockFadeIn{from{opacity:0;transform:translateY(20px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.lock-icon{
  width:64px;height:64px;margin:0 auto 18px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  background:linear-gradient(145deg,rgba(212,160,53,0.1),rgba(212,160,53,0.03));
  border:1px solid rgba(212,160,53,0.15);
  font-size:28px;
  box-shadow:0 0 30px rgba(212,160,53,0.08);
  animation:iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse{0%,100%{box-shadow:0 0 30px rgba(212,160,53,0.08)}50%{box-shadow:0 0 40px rgba(212,160,53,0.15)}}
h1{
  font-size:24px;color:#F0C45C;margin-bottom:4px;
  font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:0.06em;
}
p.subtitle{
  font-size:11px;color:rgba(138,112,72,0.8);margin-bottom:32px;line-height:1.5;
  letter-spacing:1.5px;text-transform:uppercase;font-weight:400;
}
.input-wrap{position:relative;margin-bottom:18px}
input[type=password]{
  width:100%;padding:16px 50px 16px 18px;
  background:rgba(30,23,14,0.6);
  border:1px solid rgba(212,160,53,0.12);
  border-radius:12px;color:#F5EADA;font-size:18px;font-family:'Outfit',sans-serif;
  letter-spacing:8px;text-align:center;outline:none;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
input[type=password]:focus{
  border-color:rgba(212,160,53,0.4);
  box-shadow:0 0 0 3px rgba(212,160,53,0.08),0 0 24px rgba(212,160,53,0.06);
  background:rgba(30,23,14,0.8);
}
input[type=password]::placeholder{letter-spacing:1px;font-size:13px;color:rgba(138,112,72,0.4);font-weight:300}
.eye{position:absolute;right:16px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(138,112,72,0.5);cursor:pointer;font-size:18px;padding:4px;
  transition:color 0.2s}
.eye:hover{color:rgba(212,160,53,0.7)}
.btn{
  width:100%;padding:16px;
  background:linear-gradient(135deg,#C8922A 0%,#E8B84B 50%,#D4A035 100%);
  color:#080603;border:none;border-radius:12px;
  font-weight:600;font-size:14px;cursor:pointer;
  transition:all 0.3s;margin-bottom:14px;
  box-shadow:0 4px 20px rgba(212,160,53,0.25);
  font-family:'Outfit',sans-serif;letter-spacing:0.5px;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.1) 50%,transparent 70%);
  opacity:0;transition:opacity 0.3s;
}
.btn:hover{box-shadow:0 6px 28px rgba(212,160,53,0.35);transform:translateY(-1px)}
.btn:hover::after{opacity:1}
.btn:active{transform:scale(0.98) translateY(0);box-shadow:0 2px 12px rgba(212,160,53,0.2)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.err{color:#D4463A;font-size:13px;min-height:22px;margin-top:4px;font-weight:400}
.info{
  font-size:10px;color:rgba(138,112,72,0.4);margin-top:24px;line-height:1.8;
  letter-spacing:0.3px;
}
.progress{
  width:0%;height:2px;
  background:linear-gradient(90deg,#C8922A,#F0C45C,#D4A035);
  border-radius:2px;margin-bottom:18px;transition:width 0.15s;
  box-shadow:0 0 8px rgba(212,160,53,0.3);
}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake 0.4s ease}
</style>
</head>
<body>
<div class="lock" id="lockBox">
  <div class="lock-icon">🔐</div>
  <h1>Premium Tesbih</h1>
  <p class="subtitle">Geschützte App · Passwort eingeben</p>
  <div class="progress" id="progress"></div>
  <div class="input-wrap">
    <input type="password" id="pwInput" placeholder="Passwort eingeben"
           autocomplete="current-password" autocorrect="off" autocapitalize="off"
           onkeydown="if(event.key==='Enter')unlock()">
    <button class="eye" onclick="toggleEye()" id="eyeBtn" tabindex="-1">👁</button>
  </div>
  <div class="err" id="err"></div>
  <button class="btn" id="unlockBtn" onclick="unlock()">Öffnen</button>
  <div class="info">
    🛡️ AES-256-GCM · PBKDF2 600.000 Iterationen<br>
    Falsche Passwörter werden verlangsamt
  </div>
</div>

const SALT="PremiumTesbih_CodeEncrypt_2026";
const ITER=600000;
let attempts=0,locked=false,showPw=false;

function toggleEye(){
  showPw=!showPw;
  const inp=document.getElementById('pwInput');
  inp.type=showPw?'text':'password';
  document.getElementById('eyeBtn').textContent=showPw?'🙈':'👁';
}

function setProgress(p){document.getElementById('progress').style.width=p+'%'}

async function unlock(){
  if(locked)return;
  const pw=document.getElementById('pwInput').value;
  if(!pw){document.getElementById('err').textContent='Bitte Passwort eingeben';return}

  const btn=document.getElementById('unlockBtn');
  btn.disabled=true;btn.textContent='⏳ Entschlüsselt...';
  document.getElementById('err').textContent='';
  setProgress(10);

  if(attempts>0){
    const delay=Math.min(attempts*2000, 30000);
    btn.textContent=`⏳ Warte ${Math.ceil(delay/1000)}s...`;
    await new Promise(r=>setTimeout(r,delay));
  }

  try{
    const enc=new TextEncoder();
    setProgress(30);
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),{name:'PBKDF2'},false,['deriveKey']);
    setProgress(50);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:enc.encode(SALT),iterations:ITER,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']);
    setProgress(80);
    const raw=Uint8Array.from(atob(EP),c=>c.charCodeAt(0));
    const iv=raw.slice(0,12),ct=raw.slice(12);
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    setProgress(100);
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    attempts++;
    setProgress(0);
    btn.disabled=false;
    btn.textContent='Öffnen';
    const errEl=document.getElementById('err');
    errEl.textContent=attempts>=3
      ? `❌ Falsches Passwort (${attempts} Versuche)`
      : '❌ Falsches Passwort';
    document.getElementById('lockBox').classList.add('shake');
    setTimeout(()=>document.getElementById('lockBox').classList.remove('shake'),400);
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}

document.getElementById('pwInput').focus();
